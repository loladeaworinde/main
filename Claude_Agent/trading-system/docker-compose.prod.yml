services:
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_pass}
      POSTGRES_DB: ${POSTGRES_DB:-trading_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader} -d ${POSTGRES_DB:-trading_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-trader_pass}@db:5432/${POSTGRES_DB:-trading_db}
      - REDIS_URL=redis://redis:6379
    volumes:
      - models_data:/app/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped

  worker:
    build: ./backend
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-trader_pass}@db:5432/${POSTGRES_DB:-trading_db}
      - REDIS_URL=redis://redis:6379
    volumes:
      - models_data:/app/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped

  beat:
    build: ./backend
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-trader_pass}@db:5432/${POSTGRES_DB:-trading_db}
      - REDIS_URL=redis://redis:6379
    volumes:
      - models_data:/app/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.tasks.celery_app beat --loglevel=info
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://${SERVER_IP:-localhost}:8000
      - NEXT_PUBLIC_WS_URL=ws://${SERVER_IP:-localhost}:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  models_data:
